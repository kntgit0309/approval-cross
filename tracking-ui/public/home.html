<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Approval Center — Đơn của tôi</title>
<script type="text/javascript" src="https://lf-package-sg.larksuitecdn.com/obj/lark-static-sgsaas/lark/op/h5-js-sdk-1.5.44.js"></script>
<style>
  :root{
    --blue:#3370FF; --blueHov:#245BDB; --blueBg:#EBF1FF;
    --green:#2EA121; --greenBg:#E7F4E5; --red:#D83931; --redBg:#FDE6E6;
    --orange:#FF811A; --orangeBg:#FFF3E5; --grey:#8F959E; --greyBg:#F0F1F2;
    --n9:#1F2329; --n8:#373B42; --n7:#51545B; --n6:#646A73; --n5:#8F959E; --n4:#BBBFC4; --n3:#DEE0E3; --n2:#EFF0F1; --n1:#F5F6F7; --white:#fff;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Helvetica Neue',Roboto,'PingFang SC','Microsoft YaHei',Arial,sans-serif;color:var(--n9);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased;background:var(--white)}
  .app{display:flex;height:100vh;overflow:hidden}
  /* ── Sidebar ── */
  .sidebar{width:228px;flex-shrink:0;border-right:1px solid var(--n3);background:var(--white);display:flex;flex-direction:column;padding:14px 10px}
  .brand{display:flex;align-items:center;gap:9px;padding:4px 10px 14px;font-size:16px;font-weight:600;color:var(--n9)}
  .brand .ic{width:26px;height:26px;border-radius:7px;background:var(--blue);display:flex;align-items:center;justify-content:center;color:#fff;flex-shrink:0}
  .search{display:flex;align-items:center;gap:8px;background:var(--n1);border:1px solid var(--n2);border-radius:8px;padding:7px 10px;margin:0 6px 12px}
  .search input{border:none;background:none;outline:none;font-size:14px;flex:1;color:var(--n8);font-family:inherit;min-width:0}
  .search input::placeholder{color:var(--n5)}
  .nav-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:8px;cursor:pointer;font-size:15px;color:var(--n8);font-weight:500;transition:background .12s}
  .nav-item:hover{background:var(--n1)}
  .nav-item.active{background:var(--blueBg);color:var(--blue)}
  .nav-item .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
  .nav-item .lbl{flex:1}
  .nav-item .badge{font-size:13px;color:var(--n5)}
  .nav-item.active .badge{color:var(--blue)}
  .who{margin-top:auto;padding:10px 12px;font-size:12px;color:var(--n5);border-top:1px solid var(--n2);display:flex;align-items:center;gap:6px;line-height:1.4}
  /* ── List column ── */
  .listcol{width:372px;flex-shrink:0;border-right:1px solid var(--n3);background:var(--n1);display:flex;flex-direction:column}
  .list-head{display:flex;align-items:center;gap:8px;padding:15px 18px;border-bottom:1px solid var(--n3);background:var(--white)}
  .list-head .t{font-size:15px;font-weight:600;color:var(--n9)}
  .list-head .c{font-size:13px;color:var(--n5)}
  .list-head .back{display:none;margin-right:4px;cursor:pointer;color:var(--n6)}
  .listbody{flex:1;overflow-y:auto;padding:12px}
  .card{background:var(--white);border:1px solid var(--n3);border-radius:10px;padding:13px 15px;margin-bottom:11px;cursor:pointer;transition:border-color .12s,box-shadow .12s}
  .card:hover{box-shadow:0 2px 10px rgba(31,35,41,.07)}
  .card.active{border-color:var(--blue);box-shadow:0 0 0 1px var(--blue)}
  .card-top{display:flex;align-items:flex-start;gap:8px;margin-bottom:9px}
  .card-top .ttl{font-size:15px;font-weight:600;color:var(--n9);flex:1;line-height:1.35}
  .pill{flex-shrink:0;display:inline-flex;align-items:center;padding:1px 8px;border-radius:4px;font-size:12px;font-weight:500;line-height:18px;white-space:nowrap}
  .p-approved{background:var(--greenBg);color:var(--green)} .p-in_progress{background:var(--blueBg);color:var(--blue)}
  .p-rejected{background:var(--redBg);color:var(--red)} .p-canceled{background:var(--greyBg);color:var(--grey)}
  .card-row{display:flex;font-size:13px;margin-bottom:4px;line-height:1.5}
  .card-row .k{color:var(--n6);white-space:nowrap}
  .card-row .v{color:var(--n8);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .card-foot{display:flex;align-items:center;gap:7px;margin-top:9px;padding-top:9px;border-top:1px solid var(--n2);font-size:12px;color:var(--n5)}
  .sys{flex-shrink:0;font-size:11px;font-weight:600;padding:1px 7px;border-radius:4px;border:1px solid var(--n3)}
  .sys.dxc{color:#8B5CF6;border-color:#E5DBFB;background:#F6F2FE} .sys.hr{color:#1CB87E;border-color:#D4F0E5;background:#EBF9F3}
  /* ── Detail column (iframe = track.html) ── */
  .detailcol{flex:1;min-width:0;background:var(--white);position:relative}
  .detailcol iframe{width:100%;height:100%;border:0;display:block}
  .empty{height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--n5);font-size:14px;gap:10px}
  .empty svg{opacity:.5}
  .loading,.failmsg{padding:60px 24px;text-align:center;color:var(--n5)}
  /* ── Responsive ── */
  @media(max-width:1080px){ .sidebar{width:64px} .sidebar .brand span,.search,.nav-item .lbl,.nav-item .badge,.who span{display:none} .nav-item{justify-content:center} }
  @media(max-width:720px){
    .sidebar{display:none}
    .listcol{width:100%;border-right:0}
    .detailcol{position:fixed;inset:0;z-index:30;transform:translateX(100%);transition:transform .22s ease}
    body.detail-open .detailcol{transform:translateX(0)}
    body.detail-open .listcol{display:none}
    .list-head .back{display:inline-flex}
  }
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="brand"><span class="ic"><svg width="15" height="15" viewBox="0 0 16 16" fill="none"><path d="M3.5 8.5l2.5 2.5 6-6.5" stroke="#fff" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg></span><span>Đơn của tôi</span></div>
    <div class="search"><svg width="15" height="15" viewBox="0 0 16 16" fill="none"><circle cx="7" cy="7" r="5" stroke="#8F959E" stroke-width="1.4"/><path d="M11 11l3 3" stroke="#8F959E" stroke-width="1.4" stroke-linecap="round"/></svg><input id="q" placeholder="Tìm đơn / mã / người gửi" /></div>
    <div id="nav"></div>
    <div class="who" id="who"></div>
  </aside>
  <section class="listcol">
    <div class="list-head"><span class="back" id="back" onclick="closeDetail()"><svg width="18" height="18" viewBox="0 0 16 16" fill="none"><path d="M10 3l-5 5 5 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></span><span class="t" id="listTitle">Tất cả</span><span class="c" id="listCnt"></span></div>
    <div class="listbody" id="listBody"><div class="loading">Đang tải…</div></div>
  </section>
  <main class="detailcol" id="detailCol">
    <div class="empty"><svg width="48" height="48" viewBox="0 0 24 24" fill="none"><rect x="4" y="3" width="16" height="18" rx="2" stroke="#BBBFC4" stroke-width="1.4"/><path d="M8 8h8M8 12h8M8 16h5" stroke="#BBBFC4" stroke-width="1.4" stroke-linecap="round"/></svg><span>Chọn một đơn để xem chi tiết</span></div>
  </main>
</div>
<script>
  var qs = new URLSearchParams(location.search);
  var EMAIL = (qs.get('email') || qs.get('u') || '').trim();
  var STATUS = { approved:'Đã duyệt', in_progress:'Đang duyệt', rejected:'Từ chối', canceled:'Đã hủy' };
  var GROUPS = [['all','Tất cả','#8F959E'],['in_progress','Đang duyệt','#3370FF'],['approved','Đã duyệt','#2EA121'],['rejected','Từ chối','#D83931']];
  var DATA=[], FILTER='all', SEARCH='', CUR=null;
  function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}
  function fmtT(t){t=String(t||'');var m=t.match(/^(\d{4})(\d{2})(\d{2})(\d{2})(\d{2})/);return m?(m[3]+'/'+m[2]+'/'+m[1].slice(2)+' '+m[4]+':'+m[5]):'';}
  function pill(s){return '<span class="pill p-'+s+'">'+(STATUS[s]||s)+'</span>';}
  function avaColor(s){var p=['#1456F0','#1CB87E','#00AAFF','#FF8800','#8B5CF6','#F54A45','#14B8A6','#EC4899'];var h=0;s=String(s||'');for(var i=0;i<s.length;i++)h=(h*31+s.charCodeAt(i))>>>0;return p[h%p.length];}
  function ava(it,sz){var ini=esc(it.initials||(it.requester||'?').slice(0,1).toUpperCase()),col=avaColor(it.requester||''),fs=Math.round(sz*0.42);var s='<span style="display:inline-flex;width:'+sz+'px;height:'+sz+'px;border-radius:50%;background:'+col+';color:#fff;font-size:'+fs+'px;font-weight:600;align-items:center;justify-content:center;vertical-align:middle;position:relative;overflow:hidden;flex-shrink:0">'+ini;if(it.avatar)s+='<img src="'+esc(it.avatar)+'" referrerpolicy="no-referrer" onerror="this.remove()" style="position:absolute;left:0;top:0;width:100%;height:100%;object-fit:cover"/>';return s+'</span>';}
  function visible(){return DATA.filter(function(it){
    if(FILTER!=='all' && it.status!==FILTER) return false;
    if(SEARCH){var h=((it.title||'')+' '+(it.id||'')+' '+(it.requester||'')+' '+(it.dept||'')+' '+(it.sub||'')).toLowerCase();if(h.indexOf(SEARCH)<0)return false;}
    return true;});}
  function renderNav(){
    var counts={all:DATA.length};DATA.forEach(function(it){counts[it.status]=(counts[it.status]||0)+1;});
    document.getElementById('nav').innerHTML=GROUPS.map(function(g){
      return '<div class="nav-item '+(FILTER===g[0]?'active':'')+'" onclick="setF(\''+g[0]+'\')"><span class="dot" style="background:'+g[2]+'"></span><span class="lbl">'+g[1]+'</span><span class="badge">'+(counts[g[0]]||0)+'</span></div>';
    }).join('');
  }
  function renderList(){
    var items=visible();
    document.getElementById('listTitle').textContent=(GROUPS.find(function(g){return g[0]===FILTER;})||[])[1]||'Tất cả';
    document.getElementById('listCnt').textContent=items.length?(items.length+' đơn'):'';
    var L=document.getElementById('listBody');
    if(!items.length){L.innerHTML='<div class="failmsg">'+(EMAIL?'Không có đơn nào.':'Mở từ trong Lark để xem đơn của bạn.<br>(test: thêm <b>?email=</b> vào URL)')+'</div>';return;}
    L.innerHTML=items.map(function(it){
      var t=fmtT(it.time);
      return '<div class="card'+(CUR===it.instance?' active':'')+'" id="c-'+esc(it.instance)+'" onclick="openItem(\''+esc(it.instance)+'\',\''+it.system+'\')">'
        +'<div class="card-top"><span class="ttl">'+esc(it.title)+'</span>'+pill(it.status)+'</div>'
        +(it.sub?'<div class="card-row"><span class="k">'+(it.system==='dxc'?'Số tiền':'Loại')+':&nbsp;</span><span class="v" style="font-weight:600">'+esc(it.sub)+'</span></div>':'')
        +'<div class="card-row" style="align-items:center"><span class="k">Người gửi:&nbsp;</span>'+ava(it,18)+'<span class="v" style="margin-left:6px">'+esc(it.requester||'—')+'</span></div>'
        +'<div class="card-row"><span class="k">Phòng ban:&nbsp;</span><span class="v">'+esc(it.dept)+'</span></div>'
        +'<div class="card-foot"><span class="sys '+it.system+'">'+(it.system==='dxc'?'Đề xuất chi':'HR')+'</span>'+(t?'<span>'+t+'</span>':'')+'<span style="margin-left:auto;color:var(--blue)">Chi tiết ›</span></div>'
        +'</div>';
    }).join('');
  }
  function openItem(inst,sys){
    CUR=inst;
    document.querySelectorAll('.card').forEach(function(c){c.classList.toggle('active',c.id==='c-'+inst);});
    document.getElementById('detailCol').innerHTML='<iframe src="/track?instance='+encodeURIComponent(inst)+'&sys='+sys+'"></iframe>';
    document.body.classList.add('detail-open');
  }
  function closeDetail(){document.body.classList.remove('detail-open');CUR=null;document.querySelectorAll('.card').forEach(function(c){c.classList.remove('active');});}
  function setF(f){FILTER=f;renderNav();renderList();}
  window.setF=setF;window.openItem=openItem;window.closeDetail=closeDetail;
  document.getElementById('q').addEventListener('input',function(e){SEARCH=e.target.value.trim().toLowerCase();renderList();});
  var loaded=false;
  function loadList(email,name){
    if(loaded)return;loaded=true;
    fetch('/track/list?email='+encodeURIComponent(email||'')).then(function(r){return r.json();}).then(function(d){
      DATA=d.items||[];
      var lbl=name?esc(name):(d.viewer?esc(d.viewer)+(d.resolved?'':' (chưa khớp NS)'):'demo: đơn gần đây');
      document.getElementById('who').innerHTML='<svg width="13" height="13" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="5" r="2.6" stroke="#8F959E" stroke-width="1.3"/><path d="M3 13c0-2.4 2.2-4 5-4s5 1.6 5 4" stroke="#8F959E" stroke-width="1.3" stroke-linecap="round"/></svg><span>'+lbl+'</span>';
      renderNav();renderList();
      if(window.innerWidth>720){var first=visible()[0];if(first)openItem(first.instance,first.system);}
    }).catch(function(e){document.getElementById('listBody').innerHTML='<div class="failmsg">Lỗi tải: '+esc(e.message)+'</div>';});
  }
  function dbg(m){ try{ fetch('/track/ssolog?m='+encodeURIComponent(m)); }catch(e){} }
  function authWithTt(appId,n){
    if(window.tt&&window.tt.requestAuthCode){
      dbg('requestAuthCode n='+n);
      window.tt.requestAuthCode({appId:appId,
        success:function(res){dbg('code OK');fetch('/track/auth?code='+encodeURIComponent(res.code)).then(function(r){return r.json();}).then(function(v){dbg('email='+(v.email||'NONE')+' src='+v.source+(v.error?' err='+v.error:''));loadList(v.email||EMAIL,v.name);}).catch(function(){loadList(EMAIL);});},
        fail:function(err){dbg('authCode FAIL '+JSON.stringify(err).slice(0,140));loadList(EMAIL);}});
    }else if(n<30){ setTimeout(function(){authWithTt(appId,n+1);},150); }   // poll chờ tt ~4.5s
    else{ dbg('tt never ready'); loadList(EMAIL); }
  }
  function startSSO(){
    setTimeout(function(){if(!loaded){dbg('TIMEOUT fallback');loadList(EMAIL);}},8000);
    dbg('start h5sdk='+(!!window.h5sdk)+' tt0='+(!!window.tt));
    if(window.h5sdk&&window.h5sdk.ready){
      try{window.h5sdk.error(function(e){dbg('h5sdk.error '+JSON.stringify(e).slice(0,120));});}catch(e){}
      window.h5sdk.ready(function(){
        dbg('ready tt='+(!!window.tt));
        fetch('/track/auth/start').then(function(r){return r.json();}).then(function(cfg){
          if(!cfg.appId){dbg('no appId');loadList(EMAIL);return;}
          authWithTt(cfg.appId,0);
        }).catch(function(){dbg('cfg err');loadList(EMAIL);});
      });
    }else{ dbg('no h5sdk fallback'); loadList(EMAIL); }
  }
  if(EMAIL)loadList(EMAIL);else startSSO();
</script>
</body>
</html>
