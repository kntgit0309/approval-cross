<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Chi tiết phê duyệt</title>
<style>
  :root{
    --blue:#3370FF; --blueBg:#EBF1FF;
    --green:#2EA121; --greenBg:#E7F4E5;
    --red:#D83931; --redBg:#FDE6E6;
    --orange:#FF811A; --orangeBg:#FFF3E5;
    --n9:#1F2329; --n8:#373B42; --n7:#51545B; --n6:#646A73; --n5:#8F959E;
    --n4:#BBBFC4; --n3:#DEE0E3; --n2:#EFF0F1; --n1:#F5F6F7; --white:#fff;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:var(--n1)}
  body{font-family:'PingFang SC','SF Pro Text',-apple-system,'Helvetica Neue',Roboto,sans-serif;
    color:var(--n9);font-size:14px;line-height:1.5;display:flex;justify-content:center}
  .doc{width:100%;max-width:920px;background:var(--white);min-height:100vh;padding:22px 40px 48px;position:relative}
  .topbar{display:flex;align-items:center;color:var(--n5);font-size:13px;margin-bottom:18px}
  .topbar .icons{margin-left:auto;display:flex;align-items:center;gap:16px}
  .close-x{cursor:pointer;display:flex;color:var(--n5);padding:4px;border-radius:6px;transition:background .15s,color .15s}
  .close-x:hover{background:var(--n2);color:var(--n8)}
  .h-title{display:flex;align-items:center;gap:10px;margin-bottom:10px;flex-wrap:wrap}
  .h-title h1{font-size:22px;font-weight:600}
  .pill{display:inline-flex;align-items:center;padding:1px 8px;border-radius:4px;font-size:12px;font-weight:500;line-height:18px}
  .chips{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
  .chip{display:inline-flex;align-items:center;padding:2px 9px;border-radius:4px;background:var(--n1);
    border:1px solid var(--n2);font-size:13px;color:var(--n7)}
  .sub-line{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--n6);margin-bottom:18px}
  .sub-line .nm{color:var(--n8);font-weight:500}
  .sep{color:var(--n3)}
  .ava{border-radius:50%;color:#fff;font-weight:600;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;font-size:11px}
  .tabs{display:flex;gap:28px;border-bottom:1px solid var(--n3);margin-bottom:8px}
  .tab{padding:10px 0;font-size:15px;color:var(--n6);cursor:pointer;position:relative;font-weight:500;transition:color .15s}
  .tab:hover{color:var(--blue)}
  .tab.active{color:var(--blue);font-weight:600}
  .tab.active::after{content:"";position:absolute;left:0;right:0;bottom:-1px;height:2px;background:var(--blue);border-radius:2px}
  .sec{margin-top:26px}
  .sec-h{display:flex;align-items:center;gap:8px;margin-bottom:14px}
  .sec-h .bar{width:3px;height:15px;background:var(--n9);border-radius:2px}
  .sec-h .t{font-size:16px;font-weight:600}
  .kv{display:flex;padding:9px 0;font-size:14px}
  .kv .k{width:160px;flex-shrink:0;color:var(--n6)}
  .kv .v{color:var(--n9);white-space:pre-wrap}
  table{width:100%;border-collapse:collapse}
  thead th{text-align:left;font-size:13px;font-weight:400;color:var(--n5);padding:10px 12px;border-bottom:1px solid var(--n3)}
  tbody td{padding:14px 12px;border-bottom:1px solid var(--n2);font-size:14px;color:var(--n8);vertical-align:top}
  .col-step{width:160px;color:var(--n7);font-weight:500}
  .col-time{width:140px;color:var(--n6)}
  .appr{display:flex;align-items:center;gap:8px}
  .cbox{margin-top:14px;border:1px solid var(--n3);border-radius:8px;padding:12px 14px;color:var(--n5);font-size:14px;display:flex;align-items:center}
  .cbox .ic{margin-left:auto;display:flex;gap:14px;color:var(--n4)}
  .loading,.err{padding:60px 20px;text-align:center;color:var(--n5)}
  .err{color:var(--red)}
  .note{margin-top:24px;font-size:12px;color:var(--n5);text-align:right}
  ::-webkit-scrollbar{width:6px}::-webkit-scrollbar-thumb{background:var(--n3);border-radius:6px}
  @media(max-width:680px){ .doc{padding:18px 16px 40px} .kv .k{width:120px} .h-title h1{font-size:19px} }
</style>
</head>
<body>
<div class="doc" id="doc"><div class="loading">Đang tải…</div></div>
<script>
const OVERALL = { in_progress:'In progress', approved:'Approved', rejected:'Rejected', canceled:'Canceled', pending:'Pending' };
const PILL = {
  approved:{c:'var(--green)',b:'var(--greenBg)'}, rejected:{c:'var(--red)',b:'var(--redBg)'},
  in_progress:{c:'var(--orange)',b:'var(--orangeBg)'}, pending:{c:'var(--n6)',b:'var(--n2)'},
  canceled:{c:'var(--n6)',b:'var(--n2)'}, submitted:{c:'var(--green)',b:'var(--greenBg)'},
};
function pill(status, text){ const s=PILL[status]||PILL.pending; return '<span class="pill" style="color:'+s.c+';background:'+s.b+'">'+(text||OVERALL[status]||status)+'</span>'; }
function avatar(initials, color, size){ size=size||24; return '<span class="ava" style="width:'+size+'px;height:'+size+'px;font-size:'+Math.round(size*0.42)+'px;background:'+(color||'#3370FF')+'">'+(initials||'?')+'</span>'; }
function esc(s){ return String(s==null?'':s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }

function render(d){
  const metaRows = (d.meta||[]).map(m=>'<div class="kv"><div class="k">'+esc(m.label)+'</div><div class="v">'+esc(m.value)+'</div></div>').join('');
  const chips = (d.tags||[]).map(t=>'<span class="chip">'+esc(t.label)+'</span>').join('');

  // Prepend dòng Submit (như Lark native) + các step duyệt
  const submitRow = '<tr><td class="col-step">Submit</td><td><div class="appr">'+avatar(d.submitter.initials,d.submitter.color,28)
    + '<span>'+esc(d.submitter.name)+'</span></div></td><td>'+pill('submitted','Submitted')+'</td><td></td>'
    + '<td class="col-time">'+esc(d.submitter.time||'')+'</td></tr>';
  const stepRows = (d.steps||[]).map(s=>{
    const result = pill(s.status, s.status==='in_progress'?'Đang duyệt':OVERALL[s.status]);
    return '<tr><td class="col-step">'+esc(s.role)+'</td>'
      + '<td><div class="appr">'+avatar(s.initials,s.color,28)+'<span>'+esc(s.name)+'</span></div></td>'
      + '<td>'+result+'</td><td>'+esc(s.comment||'')+'</td><td class="col-time">'+esc(s.time||'')+'</td></tr>';
  }).join('');

  const closeX='<span class="close-x" onclick="try{window.close()}catch(e){};history.back()"><svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M4.5 4.5l9 9M13.5 4.5l-9 9" stroke="#8F959E" stroke-width="1.5" stroke-linecap="round"/></svg></span>';

  document.getElementById('doc').innerHTML =
    '<div class="topbar"><span>No. '+esc(d.instanceCode||d.id)+'</span><span class="icons">'+closeX+'</span></div>'
    + '<div class="h-title"><h1>'+esc(d.title)+'</h1>'+pill(d.status, OVERALL[d.status])+'</div>'
    + (chips?'<div class="chips">'+chips+'</div>':'')
    + '<div class="sub-line">'+avatar(d.submitter.initials,d.submitter.color,22)+'<span class="nm">'+esc(d.submitter.name)+'</span>'
      + (d.submitter.dept?'<span>'+esc(d.submitter.dept)+'</span>':'')+'<span class="sep">|</span><span>Submitted: '+esc(d.submitter.time||'')+'</span></div>'
    + '<div class="tabs"><div class="tab active" onclick="jump(\'s-d\')">Details</div>'
      + '<div class="tab" onclick="jump(\'s-r\')">Approval Record</div><div class="tab" onclick="jump(\'s-c\')">Comments</div></div>'
    + '<div class="sec" id="s-d"><div class="sec-h"><span class="bar"></span><span class="t">Details</span></div>'+metaRows+'</div>'
    + '<div class="sec" id="s-r"><div class="sec-h"><span class="bar"></span><span class="t">Approval Record</span></div>'
      + '<table><thead><tr><th class="col-step">Step Name</th><th>Approver</th><th>Result</th><th>Comments</th><th class="col-time">Time</th></tr></thead>'
      + '<tbody>'+submitRow+stepRows+'</tbody></table></div>'
    + '<div class="sec" id="s-c"><div class="sec-h"><span class="bar"></span><span class="t">Comments</span></div>'
      + '<div class="cbox">You can @mention related members<span class="ic">'
      + '<svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M12 6l-5 5a2 2 0 102.8 2.8L15 8.8a3.5 3.5 0 10-5-5L5 8.8" stroke="#BBBFC4" stroke-width="1.3" stroke-linecap="round"/></svg></span></div></div>'
    + '<div class="note">Cập nhật: '+esc(d.updatedAt||'')+'</div>';

  const tabs=[...document.querySelectorAll('.tab')], secs=['s-d','s-r','s-c'].map(id=>document.getElementById(id));
  window.addEventListener('scroll',()=>{ let i0=0; secs.forEach((s,i)=>{ if(s.getBoundingClientRect().top<140)i0=i; });
    tabs.forEach((t,i)=>t.classList.toggle('active',i===i0)); },{passive:true});
}
function jump(id){ const n=document.getElementById(id); if(n)n.scrollIntoView({behavior:'smooth',block:'start'}); }

const params=new URLSearchParams(location.search);
const code=params.get('instance')||params.get('id')||'DEMO';
const sys=params.get('sys')||'';
fetch('/track/data?instance='+encodeURIComponent(code)+(sys?'&sys='+encodeURIComponent(sys):''))
  .then(r=>r.json()).then(d=>{ if(d&&d.error){ document.getElementById('doc').innerHTML='<div class="err">'+esc(d.error)+'</div>'; } else render(d); })
  .catch(e=>{ document.getElementById('doc').innerHTML='<div class="err">Lỗi tải: '+esc(e.message)+'</div>'; });
</script>
</body>
</html>
