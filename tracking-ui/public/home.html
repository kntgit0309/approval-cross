<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>Đơn của tôi</title>
<style>
  :root{
    --blue:#3370FF; --blueBg:#EBF1FF; --green:#2EA121; --greenBg:#E7F4E5;
    --red:#D83931; --redBg:#FDE6E6; --orange:#FF811A; --orangeBg:#FFF3E5;
    --grey:#8F959E; --greyBg:#F0F1F2;
    --n9:#1F2329; --n8:#373B42; --n6:#646A73; --n5:#8F959E; --n3:#DEE0E3; --n2:#EFF0F1; --n1:#F5F6F7; --white:#fff;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'PingFang SC','SF Pro Text',-apple-system,'Helvetica Neue',Roboto,sans-serif;color:var(--n9);background:var(--n1);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
  .wrap{max-width:760px;margin:0 auto;min-height:100vh;background:var(--n1)}
  header{position:sticky;top:0;z-index:5;background:var(--white);border-bottom:1px solid var(--n3);padding:16px 18px 0}
  .htop{display:flex;align-items:baseline;gap:10px}
  .htop h1{font-size:19px;font-weight:600}
  .htop .cnt{font-size:13px;color:var(--n5)}
  .who{font-size:12.5px;color:var(--n5);margin-top:3px}
  .tabs{display:flex;gap:6px;margin-top:14px;overflow-x:auto;padding-bottom:2px}
  .tab{flex-shrink:0;padding:6px 13px;border-radius:16px;font-size:13px;font-weight:500;color:var(--n6);background:var(--n1);border:1px solid transparent;cursor:pointer;white-space:nowrap;transition:.12s}
  .tab.active{background:var(--blueBg);color:var(--blue)}
  .tab .b{margin-left:5px;opacity:.85}
  .list{padding:12px}
  .card{background:var(--white);border:1px solid var(--n3);border-radius:12px;padding:14px 15px;margin-bottom:11px;cursor:pointer;transition:box-shadow .12s,transform .04s}
  .card:active{transform:scale(.995)}
  .card:hover{box-shadow:0 2px 12px rgba(31,35,41,.08)}
  .ctop{display:flex;align-items:flex-start;gap:8px;margin-bottom:9px}
  .ctop .ttl{font-size:15px;font-weight:600;color:var(--n9);flex:1;line-height:1.35}
  .pill{flex-shrink:0;display:inline-flex;align-items:center;padding:2px 9px;border-radius:5px;font-size:12px;font-weight:500;line-height:18px;white-space:nowrap}
  .p-approved{background:var(--greenBg);color:var(--green)} .p-in_progress{background:var(--blueBg);color:var(--blue)}
  .p-rejected{background:var(--redBg);color:var(--red)} .p-canceled{background:var(--greyBg);color:var(--grey)}
  .sub{font-size:14px;color:var(--n8);font-weight:600;margin-bottom:7px}
  .meta{display:flex;flex-wrap:wrap;gap:5px 14px;font-size:13px;color:var(--n6)}
  .meta .k{color:var(--n5)}
  .foot{display:flex;align-items:center;gap:7px;margin-top:10px;padding-top:9px;border-top:1px solid var(--n2);font-size:12px;color:var(--n5)}
  .sys{flex-shrink:0;font-size:11px;font-weight:600;padding:1px 7px;border-radius:4px;border:1px solid var(--n3);color:var(--n6)}
  .sys.dxc{color:#8B5CF6;border-color:#E5DBFB;background:#F6F2FE} .sys.hr{color:#1CB87E;border-color:#D4F0E5;background:#EBF9F3}
  .empty,.loading{padding:64px 24px;text-align:center;color:var(--n5);font-size:14px}
  .loading .dots span{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--n3);margin:0 3px;animation:d 1.2s infinite}
  .loading .dots span:nth-child(2){animation-delay:.2s}.loading .dots span:nth-child(3){animation-delay:.4s}
  @keyframes d{0%,80%,100%{transform:scale(.7);opacity:.5}40%{transform:scale(1.1);opacity:1}}
  ::-webkit-scrollbar{width:6px;height:6px}::-webkit-scrollbar-thumb{background:var(--n3);border-radius:6px}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="htop"><h1>Đơn của tôi</h1><span class="cnt" id="cnt"></span></div>
    <div class="who" id="who"></div>
    <div class="tabs" id="tabs"></div>
  </header>
  <div class="list" id="list"><div class="loading"><div class="dots"><span></span><span></span><span></span></div></div></div>
</div>
<script>
  var qs = new URLSearchParams(location.search);
  var EMAIL = (qs.get('email') || qs.get('u') || '').trim();   // sau này SSO tự điền
  var STATUS = { approved:{l:'Đã duyệt'}, in_progress:{l:'Đang duyệt'}, rejected:{l:'Từ chối'}, canceled:{l:'Đã hủy'} };
  var TABS = [['all','Tất cả'],['in_progress','Đang duyệt'],['approved','Đã duyệt'],['rejected','Từ chối']];
  var DATA = [], FILTER = 'all';
  function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];}); }
  function fmtT(t){ t=String(t||''); var m=t.match(/^(\d{4})(\d{2})(\d{2})(\d{2})(\d{2})/); return m? (m[3]+'/'+m[2]+' '+m[4]+':'+m[5]) : ''; }
  function pill(s){ return '<span class="pill p-'+s+'">'+((STATUS[s]||{}).l||s)+'</span>'; }
  function render(){
    var items = DATA.filter(function(it){ return FILTER==='all' || it.status===FILTER; });
    var counts = {all:DATA.length}; DATA.forEach(function(it){ counts[it.status]=(counts[it.status]||0)+1; });
    document.getElementById('tabs').innerHTML = TABS.map(function(t){
      var c = counts[t[0]]||0;
      return '<div class="tab '+(FILTER===t[0]?'active':'')+'" onclick="setF(\''+t[0]+'\')">'+t[1]+(c?'<span class="b">'+c+'</span>':'')+'</div>';
    }).join('');
    var L = document.getElementById('list');
    if(!items.length){ L.innerHTML = '<div class="empty">'+(EMAIL? 'Không có đơn nào.' : 'Mở từ trong Lark để xem đơn của bạn.<br>(hoặc thêm <b>?email=</b> vào URL để test)')+'</div>'; return; }
    L.innerHTML = items.map(function(it){
      var t = fmtT(it.time);
      return '<div class="card" onclick="open_(\''+esc(it.instance)+'\',\''+it.system+'\')">'
        + '<div class="ctop"><span class="ttl">'+esc(it.title)+'</span>'+pill(it.status)+'</div>'
        + (it.sub? '<div class="sub">'+esc(it.sub)+'</div>':'')
        + '<div class="meta"><span><span class="k">Phòng ban </span>'+esc(it.dept)+'</span>'+(it.requester?'<span><span class="k">Người gửi </span>'+esc(it.requester)+'</span>':'')+'</div>'
        + '<div class="foot"><span class="sys '+it.system+'">'+(it.system==='dxc'?'Đề xuất chi':'HR')+'</span>'+(t?'<span>'+t+'</span>':'')+'<span style="margin-left:auto;color:var(--blue)">Xem chi tiết ›</span></div>'
        + '</div>';
    }).join('');
  }
  function setF(f){ FILTER=f; render(); }
  function open_(inst, sys){ location.href = '/track?instance='+encodeURIComponent(inst)+'&sys='+sys; }
  window.setF=setF; window.open_=open_;
  fetch('/track/list?email='+encodeURIComponent(EMAIL))
    .then(function(r){ return r.json(); })
    .then(function(d){
      DATA = d.items || [];
      document.getElementById('cnt').textContent = DATA.length? (DATA.length+' đơn') : '';
      document.getElementById('who').textContent = d.viewer ? ('👤 '+d.viewer+(d.resolved?'':' — không tìm thấy nhân sự khớp email')) : 'Chưa xác định user (demo: hiện đơn gần đây)';
      render();
    })
    .catch(function(e){ document.getElementById('list').innerHTML = '<div class="empty">Lỗi tải danh sách: '+esc(e.message)+'</div>'; });
</script>
</body>
</html>
