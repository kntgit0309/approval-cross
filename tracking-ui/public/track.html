<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
<title>Theo dõi phê duyệt</title>
<style>
  /* ─── Lark Design Tokens ─── */
  :root{
    --primary:#1456F0; --primaryHov:#0E47D6; --primaryBg:#EEF3FF;
    --success:#1CB87E; --successBg:#E8F9F2;
    --warn:#FF8800;    --warnBg:#FFF4E5;
    --danger:#F54A45;  --dangerBg:#FFF0EF;
    --n9:#1F2329; --n8:#3D3D3D; --n7:#51545B; --n6:#646A73;
    --n5:#8F959E; --n4:#B2B8C0; --n3:#DEE0E3; --n2:#F3F4F5; --n1:#F9FAFB;
    --white:#FFFFFF; --radius:8px; --radiusLg:12px;
    --font:'PingFang SC','SF Pro Text',-apple-system,'Helvetica Neue',sans-serif;
    --shadow:0 2px 8px rgba(31,35,41,.10),0 0 1px rgba(31,35,41,.08);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{font-family:var(--font);background:var(--n1);color:var(--n9);
    -webkit-font-smoothing:antialiased;min-height:100vh;overflow-x:hidden}
  ::-webkit-scrollbar{width:4px}
  ::-webkit-scrollbar-thumb{background:var(--n3);border-radius:4px}
  @keyframes larkDot{0%,80%,100%{transform:scale(.7);opacity:.5}40%{transform:scale(1.1);opacity:1}}
  @keyframes spin{to{transform:rotate(360deg)}}
  @keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

  .wrap{max-width:480px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;background:var(--n1)}

  /* Nav bar */
  .nav{position:sticky;top:0;z-index:10;background:var(--white);border-bottom:1px solid var(--n3);
    height:50px;display:flex;align-items:center;gap:8px;padding:0 16px}
  .nav h1{font-size:15px;font-weight:600;color:var(--n9);flex:1;margin:0;min-width:0;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .nav #navStatus{flex-shrink:0}
  .nav-back{background:none;border:none;cursor:pointer;color:var(--n6);padding:4px;display:flex;flex-shrink:0}

  /* Tag / status */
  .tag{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:4px;
    font-size:11px;font-weight:500;line-height:18px;background:var(--primaryBg);color:var(--primary)}
  .stag{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:4px;
    font-size:11px;font-weight:500;line-height:18px;white-space:nowrap;flex-shrink:0}

  /* Avatar */
  .av{border-radius:50%;color:#fff;font-weight:600;display:flex;align-items:center;
    justify-content:center;flex-shrink:0;letter-spacing:.2px}

  .card{background:var(--white);border-bottom:1px solid var(--n3);padding:16px;animation:fadeUp .25s both}
  .card-title{font-size:16px;font-weight:600;line-height:1.5;margin:0 0 10px}
  .tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
  .kv{display:flex;gap:12px;padding:6px 0}
  .kv+.kv{border-top:1px solid var(--n2)}
  .kv .k{width:96px;flex-shrink:0;font-size:12px;color:var(--n5)}
  .kv .v{font-size:12px;color:var(--n8);line-height:1.6;word-break:break-word}

  .section{padding:14px 16px 0}
  .section-h{font-size:13px;font-weight:600;color:var(--n9);margin-bottom:10px}

  /* Progress bar */
  .pb-top{display:flex;justify-content:space-between;margin-bottom:6px}
  .pb-top .l{font-size:12px;color:var(--n6)}
  .pb-top .r{font-size:12px;color:var(--primary);font-weight:600}
  .pb{height:4px;background:var(--n2);border-radius:99px;overflow:hidden}
  .pb-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--primary),#4F8BFF);
    width:0;transition:width .7s cubic-bezier(.4,0,.2,1)}

  /* Timeline */
  .tl{padding:14px 16px 0}
  .step{display:flex;gap:12px}
  .step-l{display:flex;flex-direction:column;align-items:center;width:24px;flex-shrink:0}
  .dot{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;
    flex-shrink:0;position:relative;z-index:2;background:#fff;border:2px solid var(--n3);transition:all .2s}
  .line{width:1.5px;flex:1;min-height:20px;background:var(--n3);margin:4px 0}
  .step-r{flex:1;min-width:0;padding-bottom:10px}
  .step-card{background:var(--white);border:1px solid var(--n3);border-radius:var(--radius);
    padding:10px 12px;transition:border-color .15s,box-shadow .15s}
  .step-card.clickable{cursor:pointer}
  .step-head{display:flex;align-items:center;gap:8px;margin-bottom:6px}
  .step-head .mid{flex:1;min-width:0}
  .step-head .nm{font-size:13px;font-weight:600;color:var(--n9);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .step-head .ro{font-size:11px;color:var(--n5);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .step-time{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--n5)}
  .cmt-wrap{max-height:0;overflow:hidden;transition:max-height .3s ease}
  .cmt-wrap.open{max-height:200px}
  .cmt{margin-top:6px;padding:7px 10px;border-radius:6px;font-size:12px;color:var(--n8);line-height:1.6}
  .cmt-toggle{margin-top:4px;font-size:11px;color:var(--primary);display:flex;align-items:center;gap:2px;cursor:pointer}
  .pending-hint{font-size:12px;color:var(--n4);font-style:italic}

  /* Footer */
  .footer{position:sticky;bottom:0;background:var(--white);border-top:1px solid var(--n3);
    padding:10px 16px;display:flex;gap:8px}
  .btn{flex:1;padding:10px;border-radius:var(--radius);border:none;background:var(--primary);
    color:#fff;font-size:13px;font-weight:500;cursor:pointer;font-family:var(--font)}
  .btn:active{background:var(--primaryHov)}
  .btn.ghost{flex:none;padding:10px 16px;border:1px solid var(--n3);background:#fff;color:var(--n7)}
  a.btn{display:flex;align-items:center;justify-content:center;text-decoration:none}

  /* States */
  .center{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;
    padding:40px;color:var(--n5);text-align:center}
  .spin{width:28px;height:28px;border:3px solid var(--n2);border-top-color:var(--primary);
    border-radius:50%;animation:spin .8s linear infinite}
</style>
</head>
<body>
<div class="wrap" id="root">
  <div class="nav">
    <button class="nav-back" onclick="history.length>1?history.back():window.close()" aria-label="Quay lại">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M11 4L6 9l5 5" stroke="#646A73" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
    <h1>Chi tiết phê duyệt</h1>
    <span id="navStatus"></span>
  </div>
  <div id="body" style="flex:1;display:flex;flex-direction:column">
    <div class="center"><div class="spin"></div><div>Đang tải…</div></div>
  </div>
</div>

<script>
const STATUS = {
  approved:    {label:'Đã duyệt',   color:'var(--success)', bg:'var(--successBg)', border:'#1CB87E'},
  in_progress: {label:'Đang duyệt', color:'var(--warn)',    bg:'var(--warnBg)',    border:'#FF8800'},
  rejected:    {label:'Từ chối',    color:'var(--danger)',  bg:'var(--dangerBg)',  border:'#F54A45'},
  pending:     {label:'Chờ duyệt',  color:'var(--n5)',      bg:'var(--n2)',        border:'#DEE0E3'},
  canceled:    {label:'Đã hủy',     color:'var(--n5)',      bg:'var(--n2)',        border:'#DEE0E3'},
};
const esc = s => String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const qs = new URLSearchParams(location.search);
const instance = qs.get('instance') || qs.get('id') || 'DEMO';
const sys = qs.get('sys') || '';

function avatar(initials,color,size,url){
  const base=`width:${size}px;height:${size}px;font-size:${Math.round(size*0.34)}px;background:${color||'var(--primary)'}`;
  if(url){
    // div initials làm nền; img Lark phủ lên — img lỗi (onerror) thì ẩn để lộ initials
    return `<div class="av" style="${base};position:relative;overflow:hidden">${esc(initials)}<img src="${esc(url)}" alt="" referrerpolicy="no-referrer" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover" onerror="this.style.display='none'"></div>`;
  }
  return `<div class="av" style="${base}">${esc(initials)}</div>`;
}
function statusTag(st){
  const s = STATUS[st]||STATUS.pending;
  let ic='';
  if(st==='approved') ic='<svg width="10" height="10" viewBox="0 0 10 10"><polyline points="1.5,5 4,7.5 8.5,2.5" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>';
  else if(st==='in_progress') ic='<span style="font-size:10px;letter-spacing:1px">•••</span>';
  else if(st==='rejected') ic='✕';
  else if(st==='canceled') ic='✕';
  return `<span class="stag" style="background:${s.bg};color:${s.color}">${ic}${esc(s.label)}</span>`;
}
function dotInner(step){
  const s = STATUS[step.status]||STATUS.pending;
  if(step.status==='approved') return '<svg width="11" height="11" viewBox="0 0 11 11"><polyline points="1.5,5.5 4.5,8.5 9.5,2.5" fill="none" stroke="#1CB87E" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>';
  if(step.status==='in_progress') return `<div style="display:flex;gap:1.5px">${[0,1,2].map(i=>`<div style="width:3px;height:3px;border-radius:50%;background:#FF8800;animation:larkDot .9s ${i*0.2}s ease-in-out infinite"></div>`).join('')}</div>`;
  if(step.status==='rejected') return '<span style="color:#F54A45;font-size:10px;font-weight:700">✕</span>';
  return `<span style="color:#B2B8C0;font-size:10px;font-weight:600">${step.level}</span>`;
}

function render(d){
  document.getElementById('navStatus').innerHTML = statusTag(d.status);
  const done = d.steps.filter(s=>s.status==='approved').length;
  const pct  = Math.round(done/(d.steps.length||1)*100);

  const tagHtml = (d.tags||[]).map(t=>{
    if(t.kind==='amount') return `<span class="tag" style="background:var(--warnBg);color:var(--warn)">${esc(t.label)}</span>`;
    if(t.kind==='id')     return `<span class="tag" style="background:var(--n2);color:var(--n6)">${esc(t.label)}</span>`;
    return `<span class="tag">${esc(t.label)}</span>`;
  }).join('');

  const metaHtml = (d.meta||[]).map(m=>`<div class="kv"><span class="k">${esc(m.label)}</span><span class="v">${esc(m.value)}</span></div>`).join('');

  const lineItemsHtml = (d.lineItems&&d.lineItems.length) ? `
    <div class="card">
      <div class="section-h" style="margin-bottom:6px">Các khoản chi (${d.lineItems.length})</div>
      ${d.lineItems.map((it,i)=>`
        <div style="display:flex;gap:10px;padding:8px 0;${i>0?'border-top:1px solid var(--n2)':''}">
          <span style="width:16px;flex-shrink:0;font-size:12px;color:var(--n5);font-weight:600">${i+1}</span>
          <div style="flex:1;min-width:0">
            <div style="font-size:13px;font-weight:600;color:var(--n9)">${esc(it.amount||'')}</div>
            <div style="font-size:11px;color:var(--n6);line-height:1.6">${[it.bank,it.stk,it.owner].filter(Boolean).map(esc).join(' · ')}</div>
            ${it.desc?`<div style="font-size:11px;color:var(--n5)">${esc(it.desc)}</div>`:''}
          </div>
        </div>`).join('')}
    </div>` : '';

  const stepsHtml = d.steps.map((step,i)=>{
    const s = STATUS[step.status]||STATUS.pending;
    const isLast = i===d.steps.length-1;
    const lineBg = step.status==='approved' ? 'linear-gradient(#1CB87E,#DEE0E3)' : 'var(--n3)';
    const dotStyle = step.status==='pending'
      ? 'background:#fff;border-color:'+s.border
      : 'background:'+s.bg+';border-color:'+s.border+(step.status==='in_progress'?';box-shadow:0 0 0 3px var(--warnBg)':'');
    return `
    <div class="step">
      <div class="step-l">
        <div class="dot" style="${dotStyle}">${dotInner(step)}</div>
        ${isLast?'':`<div class="line" style="background:${lineBg}"></div>`}
      </div>
      <div class="step-r" ${isLast?'style="padding-bottom:0"':''}>
        <div class="step-card ${step.comment?'clickable':''}" ${step.comment?`onclick="toggleCmt(${i},this)"`:''} data-border="${s.border}">
          <div class="step-head">
            ${avatar(step.initials,step.color,28,step.avatar)}
            <div class="mid">
              <div class="nm">${esc(step.name)}</div>
              <div class="ro">${esc(step.role)}</div>
            </div>
            ${statusTag(step.status)}
          </div>
          ${step.time?`<div class="step-time">
            <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><circle cx="6" cy="6" r="4.5" stroke="#B2B8C0" stroke-width="1.2"/><path d="M6 3.5V6l1.5 1.5" stroke="#B2B8C0" stroke-width="1.2" stroke-linecap="round"/></svg>
            ${esc(step.time)}</div>`:''}
          ${step.comment?`
          <div class="cmt-wrap" id="cmt${i}">
            <div class="cmt" style="background:${s.bg};border-left:3px solid ${s.color}">${esc(step.comment)}</div>
          </div>
          <div class="cmt-toggle" id="tog${i}">Xem nhận xét
            <svg width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M2 4l3 3 3-3" stroke="#1456F0" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </div>`:''}
          ${step.status==='pending'?'<div class="pending-hint">Chưa đến lượt phê duyệt</div>':''}
        </div>
      </div>
    </div>`;
  }).join('');

  const footer = `
    <button class="btn" onclick="location.reload()">↻ Làm mới</button>
    ${d.links&&d.links.record?`<a class="btn ghost" href="${esc(d.links.record)}" target="_blank" rel="noopener">Mở đơn gốc</a>`:''}`;

  document.getElementById('body').innerHTML = `
    <div style="flex:1;overflow-y:auto;padding-bottom:8px">
      <div class="card">
        <h2 class="card-title">${esc(d.title)}</h2>
        <div class="tags">${tagHtml}</div>
        ${metaHtml}
      </div>
      ${lineItemsHtml}
      <div class="section">
        <div class="section-h">Quy trình phê duyệt</div>
        <div class="pb-top"><span class="l">Tiến độ phê duyệt</span><span class="r">${done}/${d.steps.length} cấp</span></div>
        <div class="pb"><div class="pb-fill" id="pbfill"></div></div>
      </div>
      <div class="tl">${stepsHtml}</div>
      <div style="height:8px"></div>
    </div>
    <div class="footer">${footer}</div>`;

  requestAnimationFrame(()=>{ const f=document.getElementById('pbfill'); if(f) f.style.width=pct+'%'; });
}

window.toggleCmt = function(i,cardEl){
  const w=document.getElementById('cmt'+i), tog=document.getElementById('tog'+i);
  if(!w) return;
  const open=w.classList.toggle('open');
  if(cardEl){ cardEl.style.borderColor = open?cardEl.dataset.border:'var(--n3)';
    cardEl.style.boxShadow = open?'0 2px 8px rgba(31,35,41,.06)':'none'; }
  if(tog){ tog.firstChild.textContent = open?'Thu gọn ':'Xem nhận xét ';
    const svg=tog.querySelector('svg'); if(svg){svg.style.transform=open?'rotate(180deg)':'none';svg.style.transition='transform .2s';} }
};

function fail(msg){
  document.getElementById('body').innerHTML =
    `<div class="center">
      <svg width="40" height="40" viewBox="0 0 40 40" fill="none"><circle cx="20" cy="20" r="18" stroke="#DEE0E3" stroke-width="1.5"/><path d="M20 12v9M20 26v.5" stroke="#B2B8C0" stroke-width="2" stroke-linecap="round"/></svg>
      <div style="font-size:13px;color:var(--n6);max-width:260px">${esc(msg)}</div>
      <button class="btn" style="flex:none;padding:8px 20px" onclick="location.reload()">Thử lại</button>
    </div>`;
}

fetch(`/track/data?instance=${encodeURIComponent(instance)}${sys?'&sys='+encodeURIComponent(sys):''}`)
  .then(r=>r.json())
  .then(d=>{ if(d.error) return fail(d.error); render(d); })
  .catch(e=>fail('Không tải được dữ liệu phê duyệt. '+e.message));
</script>
</body>
</html>
